services:
  postgres:
    image: postgres:15-alpine
    container_name: stellar_postgres
    environment:
      POSTGRES_DB: stellar_tokens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432" # SECURITY: Only localhost, not exposed externally
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stellar_network

  redis:
    image: redis:7-alpine
    container_name: stellar_redis
    # No external port exposure - only accessible within Docker network
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stellar_network
    command: redis-server --appendonly yes

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stellar_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: stellar_tokens
      DB_USER: postgres
      DB_PASSWORD: postgres
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/stellar_tokens
      # Key Management Mode ('multisig' = Freighter/Ledger, 'env' = server-side keys)
      KEY_MANAGEMENT_MODE: ${KEY_MANAGEMENT_MODE:-multisig}
      # Stellar Network
      STELLAR_NETWORK: ${STELLAR_NETWORK:-testnet}
      STELLAR_HORIZON_URL: ${STELLAR_HORIZON_URL:-https://horizon-testnet.stellar.org}
      HORIZON_URL: ${HORIZON_URL:-https://horizon-testnet.stellar.org}
      STELLAR_HOME_DOMAIN: ${STELLAR_HOME_DOMAIN:-}
      # Stellar Accounts - Public keys (always required)
      ISSUER_PUBLIC_KEY: ${ISSUER_PUBLIC_KEY}
      DISTRIBUTOR_PUBLIC_KEY: ${DISTRIBUTOR_PUBLIC_KEY}
      OPERATIONS_PUBLIC_KEY: ${OPERATIONS_PUBLIC_KEY}
      TREASURY_PUBLIC_KEY: ${TREASURY_PUBLIC_KEY}
      # Stellar Accounts - OPERATIONS_SECRET_KEY is the ONLY secret stored server-side (both dev & prod)
      # In production, OPERATIONS uses Docker Secrets (see docker-compose.prod.yml)
      ISSUER_SECRET_KEY: ${ISSUER_SECRET_KEY:-}
      DISTRIBUTOR_SECRET_KEY: ${DISTRIBUTOR_SECRET_KEY:-}
      TREASURY_SECRET_KEY: ${TREASURY_SECRET_KEY:-}
      # Channel Accounts Pool — parallel fee sponsorship (prevents tx_bad_seq)
      CHANNEL_1_SECRET_KEY: ${CHANNEL_1_SECRET_KEY:-}
      CHANNEL_2_SECRET_KEY: ${CHANNEL_2_SECRET_KEY:-}
      CHANNEL_3_SECRET_KEY: ${CHANNEL_3_SECRET_KEY:-}
      CHANNEL_4_SECRET_KEY: ${CHANNEL_4_SECRET_KEY:-}
      CHANNEL_5_SECRET_KEY: ${CHANNEL_5_SECRET_KEY:-}
      # Token Details
      # ASSET_CODE and ASSET_SUPPLY removed - using offer-specific assets
      # USDC_ISSUER is auto-detected based on STELLAR_NETWORK (testnet/mainnet)
      # Set explicitly only if using a custom USDC issuer
      USDC_ISSUER: ${USDC_ISSUER:-}
      # Security
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      API_KEY: ${API_KEY}
      # Email (Resend HTTP API — no SMTP needed)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Radox <noreply@mail.radox.net>}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Pinata Web3 (IPFS)
      PINATA_JWT: ${PINATA_JWT}
      # WebAuthn
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-localhost}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-http://localhost:5173}
      # Smart Wallets (OpenZeppelin Stellar Channels)
      SOROBAN_RPC_URL: ${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}
      CHANNELS_API_KEY: ${CHANNELS_API_KEY:-}
      ACCOUNT_WASM_HASH: ${ACCOUNT_WASM_HASH:-}
      WEBAUTHN_VERIFIER_ADDRESS: ${WEBAUTHN_VERIFIER_ADDRESS:-}
      ED25519_VERIFIER_ADDRESS: ${ED25519_VERIFIER_ADDRESS:-}
      # Soroban Sale Kill Switch
      ENABLE_SOROBAN_SALE: ${ENABLE_SOROBAN_SALE:-false}
      SALE_WASM_HASH: ${SALE_WASM_HASH:-}
      # Operations secret key (testnet only — production uses Freighter)
      OPERATIONS_SECRET_KEY: ${OPERATIONS_SECRET_KEY:-}
      XLM_SAC_CONTRACT_ID: ${XLM_SAC_CONTRACT_ID:-CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC}
      USDC_SAC_CONTRACT_ID: ${USDC_SAC_CONTRACT_ID:-CBIELTK6YBZJU5UP2WWQEUCYKLPU6AUNZ2BQ4WWFEIE3USCIHMXQDAMA}
      # Yield Distribution (Soroban contract for batch investor payments)
      YIELD_DISTRIBUTOR_CONTRACT_ID: ${YIELD_DISTRIBUTOR_CONTRACT_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stellar_network
    volumes:
      - backups_data:/app/backups
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        cd backend &&
        node --import tsx src/database/migrate.js &&
        node --import tsx src/index.js
      "

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: stellar_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - stellar_network

volumes:
  postgres_data:
  redis_data:
  backups_data:


networks:
  stellar_network:
    name: ${COMPOSE_PROJECT_NAME:-stellar}_network
    driver: bridge
