services:
  postgres:
    image: postgres:15-alpine
    container_name: stellar_postgres
    environment:
      POSTGRES_DB: stellar_tokens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432" # SECURITY: Only localhost, not exposed externally
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stellar_network

  redis:
    image: redis:7-alpine
    container_name: stellar_redis
    # No external port exposure - only accessible within Docker network
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stellar_network
    command: redis-server --appendonly yes

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stellar_backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: stellar_tokens
      DB_USER: postgres
      DB_PASSWORD: postgres
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/stellar_tokens
      # Stellar Network
      STELLAR_NETWORK: ${STELLAR_NETWORK:-testnet}
      STELLAR_HORIZON_URL: ${STELLAR_HORIZON_URL:-https://horizon-testnet.stellar.org}
      HORIZON_URL: ${HORIZON_URL:-https://horizon-testnet.stellar.org}
      # Stellar Accounts (configure no .env ou passe via variáveis)
      ISSUER_SECRET_KEY: ${ISSUER_SECRET_KEY}
      ISSUER_PUBLIC_KEY: ${ISSUER_PUBLIC_KEY}
      DISTRIBUTOR_SECRET_KEY: ${DISTRIBUTOR_SECRET_KEY}
      DISTRIBUTOR_PUBLIC_KEY: ${DISTRIBUTOR_PUBLIC_KEY}
      OPERATIONS_SECRET_KEY: ${OPERATIONS_SECRET_KEY}
      OPERATIONS_PUBLIC_KEY: ${OPERATIONS_PUBLIC_KEY}
      TREASURY_SECRET_KEY: ${TREASURY_SECRET_KEY}
      TREASURY_PUBLIC_KEY: ${TREASURY_PUBLIC_KEY}
      # Token Details
      # ASSET_CODE and ASSET_SUPPLY removed - using offer-specific assets
      USDC_ISSUER: ${USDC_ISSUER:-GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN}
      # Security
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      API_KEY: ${API_KEY}
      # Email (opcional)
      SMTP_HOST: ${SMTP_HOST}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      # Payment Scheduler
      ENABLE_AUTO_PAYMENTS: ${ENABLE_AUTO_PAYMENTS:-true}
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Pinata Web3 (IPFS)
      PINATA_JWT: ${PINATA_JWT}
      # WebAuthn
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-localhost}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-http://localhost:5173}
      # Stellar Passkey Kit & Smart Wallets
      SOROBAN_RPC_URL: ${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}
      LAUNCHTUBE_URL: ${LAUNCHTUBE_URL:-https://launchtube.xyz}
      LAUNCHTUBE_JWT: ${LAUNCHTUBE_JWT}
      FACTORY_CONTRACT_ID: ${FACTORY_CONTRACT_ID}
      # Soroban Asset Contracts for balance queries
      XLM_SAC_CONTRACT_ID: ${XLM_SAC_CONTRACT_ID:-CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC}
      USDC_SAC_CONTRACT_ID: ${USDC_SAC_CONTRACT_ID:-CBIELTK6YBZJU5UP2WWQEUCYKLPU6AUNZ2BQ4WWFEIE3USCIHMXQDAMA}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stellar_network
    # volumes:
    #   - ./backend:/app/backend
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        cd backend &&
        node --import tsx src/database/migrate.js &&
        node --import tsx src/index.js
      "

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: stellar_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - stellar_network

volumes:
  postgres_data:
  redis_data:


networks:
  stellar_network:
    driver: bridge
