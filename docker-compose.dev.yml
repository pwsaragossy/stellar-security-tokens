# Docker Compose for Development
# This file overrides settings from docker-compose.yml for local development
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# To stop:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml down
#
# Features enabled in dev mode:
#   - Reads .env automatically (Docker Compose default)
#   - NODE_ENV=development
#   - Hot-reload via volume mounts
#   - More verbose logging

services:
  backend:
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      # Operations secret key for dev (in prod this comes from Docker Secrets)
      OPERATIONS_SECRET_KEY: ${OPERATIONS_SECRET_KEY:-}
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/prisma:/app/backend/prisma
      - ./backend/tests:/app/backend/tests
      - ./contracts:/app/contracts:ro  # WASM binary for E2E tests

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_ENABLE_TEST_LOGIN: "true"
        VITE_DEV_TOOLS: "true"
    environment:
      NODE_ENV: development
    # For frontend hot-reload, you may want to run `npm run dev` locally instead
    # volumes:
    #   - ./frontend/src:/app/frontend/src

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel run radox-dev
    volumes:
      - /Users/pedrosaragossy/.cloudflared:/etc/cloudflared
    environment:
      TUNNEL_ORIGIN_CERT: /etc/cloudflared/cert.pem
    networks:
      - stellar_network
    depends_on:
      - frontend
      - backend
