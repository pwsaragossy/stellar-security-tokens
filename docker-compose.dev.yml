# Docker Compose for Development
# This file overrides settings from docker-compose.yml for local development
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# To stop:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml down
#
# Features enabled in dev mode:
#   - NODE_ENV=development
#   - Hot-reload via volume mounts (optional, commented out)
#   - More verbose logging

services:
  backend:
    environment:
      # Development environment
      NODE_ENV: development
      # Enable more verbose logging
      LOG_LEVEL: debug
      # Keep IPFS mocked in dev (empty = mock mode, real JWT in production only)
      PINATA_JWT: ""
    # Enable hot-reload by mounting source code
    # Uncomment these volumes for live code changes:
    # volumes:
    #   - ./backend/src:/app/backend/src
    #   - ./backend/prisma:/app/backend/prisma

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_ENABLE_TEST_LOGIN: "true"
    environment:
      NODE_ENV: development
    # For frontend hot-reload, you may want to run `npm run dev` locally instead
    # volumes:
    #   - ./frontend/src:/app/frontend/src
