# Docker Compose for Development
# This file overrides settings from docker-compose.yml for local development
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.development up
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.development up -d
#
# To stop:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml down
#
# Features enabled in dev mode:
#   - NODE_ENV=development
#   - Hot-reload via volume mounts (optional, commented out)
#   - More verbose logging

services:
  backend:
    environment:
      # Development environment
      NODE_ENV: development
      # Enable more verbose logging
      LOG_LEVEL: debug
      # PINATA_JWT comes from .env.development (real JWT for staging tests)
      # Enable hot-reload by mounting source code
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/prisma:/app/backend/prisma
      - ./backend/tests:/app/backend/tests

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_ENABLE_TEST_LOGIN: "true"
    environment:
      NODE_ENV: development
    # For frontend hot-reload, you may want to run `npm run dev` locally instead
    # volumes:
    #   - ./frontend/src:/app/frontend/src

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://frontend:80
    networks:
      - stellar_network
