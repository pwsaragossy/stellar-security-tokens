services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: stellar_tokens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stellar_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stellar_network
    restart: unless-stopped
    command: redis-server --appendonly yes

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: stellar_tokens
      DB_USER: postgres
      DB_PASSWORD: postgres
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/stellar_tokens
      STELLAR_NETWORK: ${STELLAR_NETWORK:-testnet}
      STELLAR_HORIZON_URL: ${STELLAR_HORIZON_URL:-https://horizon-testnet.stellar.org}
      HORIZON_URL: ${HORIZON_URL:-https://horizon-testnet.stellar.org}
      ISSUER_SECRET_KEY: ${ISSUER_SECRET_KEY}
      ISSUER_PUBLIC_KEY: ${ISSUER_PUBLIC_KEY}
      DISTRIBUTOR_SECRET_KEY: ${DISTRIBUTOR_SECRET_KEY}
      DISTRIBUTOR_PUBLIC_KEY: ${DISTRIBUTOR_PUBLIC_KEY}
      DISTRIBUTION_SECRET_KEY: ${DISTRIBUTION_SECRET_KEY}
      DISTRIBUTION_PUBLIC_KEY: ${DISTRIBUTION_PUBLIC_KEY}
      TREASURY_SECRET_KEY: ${TREASURY_SECRET_KEY}
      TREASURY_PUBLIC_KEY: ${TREASURY_PUBLIC_KEY}
      # ASSET_CODE removed - using offer-specific assets
      USDC_ISSUER: ${USDC_ISSUER:-GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      API_KEY: ${API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      ENABLE_AUTO_PAYMENTS: ${ENABLE_AUTO_PAYMENTS:-true}
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Pinata Web3 (IPFS)
      PINATA_JWT: ${PINATA_JWT}
      # WebAuthn
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-localhost}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-http://localhost}
      # Stellar Passkey Kit & Smart Wallets
      SOROBAN_RPC_URL: ${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}
      LAUNCHTUBE_URL: ${LAUNCHTUBE_URL:-https://launchtube.xyz}
      LAUNCHTUBE_JWT: ${LAUNCHTUBE_JWT}
      FACTORY_CONTRACT_ID: ${FACTORY_CONTRACT_ID}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stellar_network
    restart: unless-stopped
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        node backend/src/database/migrate.js &&
        node backend/src/index.js
      "

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - stellar_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:


networks:
  stellar_network:
    driver: bridge
