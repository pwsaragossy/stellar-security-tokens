# =============================================================================
# Docker Compose for Production
# =============================================================================
# PREREQUISITES:
#   - Create .env.production with ALL required variables
#   - Generate strong passwords for DB and Redis
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# To stop:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml down
#
# REQUIRED ENV VARS (will fail if not set):
#   - POSTGRES_PASSWORD
#   - JWT_SECRET
#   - ISSUER_PUBLIC_KEY, DISTRIBUTOR_PUBLIC_KEY, OPERATIONS_PUBLIC_KEY, TREASURY_PUBLIC_KEY
#   - USDC_ISSUER (mainnet Circle USDC issuer)
#   - XLM_SAC_CONTRACT_ID, USDC_SAC_CONTRACT_ID (mainnet SAC IDs)
#   - WEBAUTHN_RP_ID, WEBAUTHN_ORIGIN (your production domain)
#   - FRONTEND_URL
#   - LAUNCHTUBE_JWT, FACTORY_CONTRACT_ID
#
# NOTE: No wallet secret keys! All admin signing via Freighter/Ledger multisig.
# =============================================================================

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stellar_tokens}
      POSTGRES_USER: ${POSTGRES_USER:-stellar_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stellar_prod}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stellar_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stellar_network
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    environment:
      NODE_ENV: production
      PORT: 3000
      # Database - REQUIRED
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-stellar_tokens}
      DB_USER: ${POSTGRES_USER:-stellar_prod}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-stellar_prod}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stellar_tokens}
      # Stellar Network - MAINNET DEFAULTS
      STELLAR_NETWORK: ${STELLAR_NETWORK:-public}
      STELLAR_HORIZON_URL: ${STELLAR_HORIZON_URL:-https://horizon.stellar.org}
      HORIZON_URL: ${HORIZON_URL:-https://horizon.stellar.org}
      SOROBAN_RPC_URL: ${SOROBAN_RPC_URL:-https://mainnet.sorobanrpc.com}
      # Stellar Accounts - PUBLIC KEYS ONLY (signing via Freighter/Ledger multisig)
      ISSUER_PUBLIC_KEY: ${ISSUER_PUBLIC_KEY:?ISSUER_PUBLIC_KEY is required}
      DISTRIBUTOR_PUBLIC_KEY: ${DISTRIBUTOR_PUBLIC_KEY:?DISTRIBUTOR_PUBLIC_KEY is required}
      OPERATIONS_PUBLIC_KEY: ${OPERATIONS_PUBLIC_KEY:?OPERATIONS_PUBLIC_KEY is required}
      TREASURY_PUBLIC_KEY: ${TREASURY_PUBLIC_KEY:?TREASURY_PUBLIC_KEY is required}
      # USDC (empty on testnet = auto-detect, required on mainnet)
      USDC_ISSUER: ${USDC_ISSUER:-}
      # Soroban Asset Contracts - REQUIRED for balance queries
      XLM_SAC_CONTRACT_ID: ${XLM_SAC_CONTRACT_ID:?XLM_SAC_CONTRACT_ID is required}
      USDC_SAC_CONTRACT_ID: ${USDC_SAC_CONTRACT_ID:?USDC_SAC_CONTRACT_ID is required}
      # Security - REQUIRED (no insecure defaults)
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      API_KEY: ${API_KEY}
      # Frontend URL for emails/links
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      # Email Configuration (Resend HTTP API — no SMTP ports needed)
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-Radox <noreply@mail.radox.net>}
      # Payment Scheduler
      ENABLE_AUTO_PAYMENTS: ${ENABLE_AUTO_PAYMENTS:-true}
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Pinata/IPFS
      PINATA_JWT: ${PINATA_JWT}
      # WebAuthn - REQUIRED (must match production domain)
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:?WEBAUTHN_RP_ID is required}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:?WEBAUTHN_ORIGIN is required}
      # Stellar Passkey Kit & Smart Wallets
      LAUNCHTUBE_URL: ${LAUNCHTUBE_URL:-https://launchtube.xyz}
      LAUNCHTUBE_JWT: ${LAUNCHTUBE_JWT:?LAUNCHTUBE_JWT is required}
      FACTORY_CONTRACT_ID: ${FACTORY_CONTRACT_ID:?FACTORY_CONTRACT_ID is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - stellar_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        cd backend &&
        node --import tsx src/database/migrate.js &&
        node --import tsx src/index.js
      "
    volumes:
      - backups_data:/app/backups

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_STELLAR_NETWORK: ${STELLAR_NETWORK:-testnet}
        VITE_SOROBAN_RPC_URL: ${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}
        VITE_STELLAR_NETWORK_PASSPHRASE: "${VITE_STELLAR_NETWORK_PASSPHRASE:-Test SDF Network ; September 2015}"
        VITE_FACTORY_CONTRACT_ID: ${FACTORY_CONTRACT_ID}
    # Override base compose port 80 — only Caddy exposes ports externally
    ports: !override []
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:80/ > /dev/null || wget -q --spider http://localhost:80/ || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - stellar_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Caddy — Reverse proxy with automatic HTTPS for all domains
  caddy:
    image: caddy:2-alpine
    container_name: stellar_caddy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/landing:/srv/landing:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - stellar_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  backups_data:
  caddy_data:
  caddy_config:


networks:
  stellar_network:
    name: ${COMPOSE_PROJECT_NAME:-stellar}_network
    driver: bridge
