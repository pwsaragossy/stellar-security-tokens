<!doctype html>
<html lang="en" translate="no" class="notranslate">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Prevent browser translation from mutating the DOM and crashing React's reconciliation.
       Chrome checks 'google' meta + html[translate=no], Firefox checks translate attr,
       Google Translate widget checks class="notranslate". All three are set. -->
  <meta name="google" content="notranslate" />
  <title>Radox</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
